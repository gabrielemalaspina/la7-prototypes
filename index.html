<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA7 Prototypes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 48px 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      margin-top: 6px;
      font-size: 14px;
      color: #666;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }

    .list {
      list-style: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      margin-bottom: 40px;
    }

    .list li {
      border-bottom: 1px solid #e0e0e0;
    }

    .list li:last-child {
      border-bottom: none;
    }

    .list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
    }

    .list a:hover {
      background: #f9f9f9;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .item-name {
      font-size: 15px;
      font-weight: 500;
    }

    .item-desc {
      font-size: 13px;
      color: #888;
    }

    .item-versions {
      display: flex;
      gap: 6px;
    }

    .version-tag {
      font-size: 11px;
      font-weight: 500;
      background: #f0f0f0;
      color: #555;
      padding: 2px 8px;
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.1s;
    }

    .version-tag:hover {
      background: #e0e0e0;
    }

    .arrow {
      color: #bbb;
      font-size: 18px;
      margin-left: 16px;
    }

    footer {
      font-size: 12px;
      color: #bbb;
      margin-top: 48px;
    }
  </style>
</head>
<body>

  <header>
    <h1>LA7 — Prototypes</h1>
    <p>Componenti e pattern per il redesign di la7.it — uso interno e handoff dev</p>
  </header>

  <!-- ESEMPIO DI SEZIONE — duplica il blocco per aggiungere categorie -->
  <p class="section-title">Componenti</p>
  <ul class="list">

    <!-- Prototipo con link diretto (una sola versione) -->
    <li>
      <a href="./example/">
        <div class="item-info">
          <span class="item-name">Example Component</span>
          <span class="item-desc">Prototipo di esempio — sostituire con il primo vero componente</span>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>

    <!-- Prototipo con versioni multiple — rimuovi l'<a> wrapper e usa i tag versione -->
    <!--
    <li>
      <div style="display:flex; align-items:center; justify-content:space-between; padding: 14px 18px;">
        <div class="item-info">
          <span class="item-name">Navigation Bar</span>
          <span class="item-desc">Sticky nav con varianti mobile/desktop</span>
        </div>
        <div class="item-versions">
          <a class="version-tag" href="./navbar/v1/">v1</a>
          <a class="version-tag" href="./navbar/v2/">v2</a>
        </div>
      </div>
    </li>
    -->

  </ul>

  <footer>
    <a href="https://github.com/gabrielemalaspina/la7-prototypes" style="color:#bbb;">github.com/gabrielemalaspina/la7-prototypes</a>
  </footer>

</body>
</html>
