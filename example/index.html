<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Component — LA7 Prototypes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    /* ── Prototype chrome ─────────────────────────────── */
    .proto-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 12px;
      z-index: 9999;
    }

    .proto-bar a {
      color: #888;
      text-decoration: none;
    }

    .proto-bar a:hover { color: #fff; }

    .proto-name { font-weight: 500; color: #fff; }

    /* ── Prototype content ────────────────────────────── */
    .proto-stage {
      margin-top: 40px;
      min-height: calc(100vh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* Sostituisci tutto qui sotto con il tuo componente */
    .placeholder {
      background: #fff;
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .placeholder h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .placeholder p {
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <nav class="proto-bar">
    <span class="proto-name">Example Component</span>
    <a href="../">← tutti i prototipi</a>
  </nav>

  <div class="proto-stage">
    <!-- ↓ Sostituisci questo blocco con il tuo componente ↓ -->
    <div class="placeholder">
      <h2>Il tuo componente va qui</h2>
      <p>Svuota questo file e incolla il tuo HTML/CSS.<br>La barra nera in alto è già pronta.</p>
    </div>
    <!-- ↑ Fine del blocco da sostituire ↑ -->
  </div>

</body>
</html>
